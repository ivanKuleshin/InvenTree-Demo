# -----------------------------------------------
# InvenTree TAF Configuration
# -----------------------------------------------

# Base URL for all API requests
api.base.url=https://demo.inventree.org

# Auth strategy: TOKEN or BASIC
api.auth.strategy=TOKEN

# HTTP request connect + read timeout in milliseconds
api.request.timeout.ms=20000

# Enable request/response logging in REST Assured (true/false)
api.logging.enabled=true

# -----------------------------------------------
# Role-based credentials
# Key pattern: api.credentials.<role-lowercase>.<username|password>
# -----------------------------------------------

api.credentials.allaccess.username=allaccess
api.credentials.allaccess.password=nolimits

api.credentials.reader.username=reader
api.credentials.reader.password=readonly

api.credentials.engineer.username=engineer
api.credentials.engineer.password=partsonly

api.credentials.admin.username=admin
api.credentials.admin.password=inventree
